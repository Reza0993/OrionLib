name: Deploy OrionLib

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            cd ~/OrionLib

            git pull origin main

            # Backend
            cd backend
            npm install

            pm2 restart orionlib-api || pm2 start app.js --name orionlib-api

            # Frontend
            cd ~/OrionLib/frontend/orionlib-frontend

            npm install
            npm run build

            sudo rm -rf /var/www/orionlib/*
            sudo cp -r dist/* /var/www/orionlib/

            sudo systemctl reload nginx