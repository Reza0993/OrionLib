name: Backend Deploy

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/OrionLib

            git pull origin master

            cd backend

            npm install

            pm2 restart orionlib-api || pm2 start app.js --name orionlib-api

            pm2 save
